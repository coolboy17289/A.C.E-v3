<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0b1020" />
    <!-- Touch-first: prevent tap delay, prevent text-selection bounce. -->
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; }
      body { background: #0b1020; color: #e6ebff;
             font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
             -webkit-user-select: none; user-select: none;
             -webkit-tap-highlight-color: transparent; }
      /* Bootstrap splash (pre-React). Plymouth owns the boot splash; this
         one fills the few frames between React's mount commit and the
         first paint of the dashboard. Same dark backdrop + brand glyph. */
      .boot-splash {
        position: absolute; inset: 0; display: grid; place-items: center;
        background: #0b1020; color: #e6ebff;
      }
      .boot-splash .arc { font-weight: 800; font-size: 28px;
        background: linear-gradient(90deg, #3da8ff 0%, #7c8eff 50%, #8a5cff 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent; }
      .boot-splash .hint { margin-top: 16px; color: #9aa6c8; font-size: 16px; }
    </style>
    <title>A.C.E OS</title>
  </head>
  <body>
    <div id="root">
      <div class="boot-splash">
        <div>
          <div class="arc">A.C.E</div>
          <div class="hint">Loading…</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
